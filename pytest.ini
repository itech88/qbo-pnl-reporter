[pytest]
testpaths = tests

# Keep the regression signal clean. These are noisy third-party deprecation
# warnings from matplotlib's vendored pyparsing (chart rendering), plus the
# expected "no labels" legend notice from the empty-vendor-data edge-case test.
# Narrow message matches only — our own DeprecationWarnings stay visible.
filterwarnings =
    ignore:.*deprecated - use.*
    ignore:No artists with labels found.*:UserWarning

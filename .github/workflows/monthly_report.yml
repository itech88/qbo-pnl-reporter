name: Monthly COGS Report

on:
  schedule:
    # 10:00 AM PST (UTC-8) = 18:00 UTC on the 1st and 16th of every month
    # Note: fires at 11:00 AM during daylight saving time (PDT = UTC-7)
    - cron: "0 18 1,16 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (save HTML, skip email)"
        type: boolean
        default: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          QBO_CLIENT_ID:      ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET:  ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REDIRECT_URI:   ${{ secrets.QBO_REDIRECT_URI }}
          QBO_REALM_ID:       ${{ secrets.QBO_REALM_ID }}
          QBO_ACCESS_TOKEN:   ${{ secrets.QBO_ACCESS_TOKEN }}
          QBO_REFRESH_TOKEN:  ${{ secrets.QBO_REFRESH_TOKEN }}
          QBO_TOKEN_EXPIRY:   ${{ secrets.QBO_TOKEN_EXPIRY }}
          QBO_ENVIRONMENT:    production
          EMAIL_PROVIDER:     ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          COGS_VARIANCE_THRESHOLD: ${{ secrets.COGS_VARIANCE_THRESHOLD }}
        run: |
          # Scheduled runs respect each report's trigger_days (so the scorecard
          # stays 1st-only). Manual dispatches force-run all reports regardless
          # of the date for on-demand testing.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FORCE=""
          else
            FORCE="--force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scheduler.py $FORCE --dry-run
          else
            python scheduler.py $FORCE
          fi

      - name: Upload preview (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-report
          path: preview_report.html
          retention-days: 3

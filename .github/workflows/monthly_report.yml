name: Monthly P&L Reports

on:
  schedule:
    # 10:00 AM PST (UTC-8) = 18:00 UTC on the 1st and 16th of every month
    # Note: fires at 11:00 AM during daylight saving time (PDT = UTC-7)
    - cron: "0 18 1,16 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (save HTML, skip email)"
        type: boolean
        default: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    # Job-level env so both the pipeline step and the failure-notify step see
    # the SMTP/QBO secrets.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      QBO_CLIENT_ID:           ${{ secrets.QBO_CLIENT_ID }}
      QBO_CLIENT_SECRET:       ${{ secrets.QBO_CLIENT_SECRET }}
      QBO_REDIRECT_URI:        ${{ secrets.QBO_REDIRECT_URI }}
      QBO_REALM_ID:            ${{ secrets.QBO_REALM_ID }}
      QBO_ACCESS_TOKEN:        ${{ secrets.QBO_ACCESS_TOKEN }}
      QBO_REFRESH_TOKEN:       ${{ secrets.QBO_REFRESH_TOKEN }}
      QBO_TOKEN_EXPIRY:        ${{ secrets.QBO_TOKEN_EXPIRY }}
      QBO_ENVIRONMENT:         production
      GH_PAT:                  ${{ secrets.GH_PAT }}
      EMAIL_PROVIDER:          ${{ secrets.EMAIL_PROVIDER }}
      EMAIL_FROM:              ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO }}
      ALERT_EMAIL:             ${{ secrets.ALERT_EMAIL }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SENDGRID_API_KEY:        ${{ secrets.SENDGRID_API_KEY }}
      COGS_VARIANCE_THRESHOLD: ${{ secrets.COGS_VARIANCE_THRESHOLD }}
      # Dead-man's-switch ping target (e.g. a healthchecks.io URL). Empty until the
      # secret is set → the heartbeat simply no-ops. Only the scheduled all-reports
      # workflow pings, so a missed cron is what the monitor detects.
      HEARTBEAT_URL:           ${{ secrets.HEARTBEAT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          # Scheduled runs respect each report's trigger_days (so the scorecard
          # stays 1st-only). Manual dispatches force-run all reports regardless
          # of the date for on-demand testing.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FORCE=""
          else
            FORCE="--force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scheduler.py $FORCE --dry-run
          else
            python scheduler.py $FORCE
          fi

      - name: Upload previews (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          # The multi-report scheduler writes preview_<slug>.html per report
          # (e.g. preview_cogs.html, preview_monthly_business_dashboard.html) —
          # never a single preview_report.html. Glob them all, and fail loudly
          # if a dry run produced nothing so the gap can't go silent again.
          name: preview-reports
          path: preview_*.html
          if-no-files-found: error
          retention-days: 3

      # Infra-level safety net: catches failures the Python process can't
      # self-report (process killed, dependency install failure, the token
      # writeback step itself). Python-level failures already send a detailed
      # in-process alert; this may add a second, generic notification.
      - name: Notify on failure
        if: ${{ failure() && github.event.inputs.dry_run != 'true' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from mailer import send_failure_alert
          send_failure_alert(
              "QBO Monthly Report workflow FAILED",
              "The scheduled QBO report workflow failed.\n\n"
              "Run: " + os.environ.get("RUN_URL", "") + "\n\n"
              "Check the Actions logs for details (token refresh, dependency "
              "install, or a killed process).",
          )
          PY
